<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thamean - Edit Request</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="create-request-container">
        <a href="user.html" class="logout-link">
            <img src="images/logout.png" alt="Back" class="logout-icon" style="transform: rotate(180deg);">
        </a>

        <div class="container">
            <div class="logo-container">
                <img src="images/thamen.bmp" alt="Thamean Logo" class="logoSmall">
            </div>

            <h2 class="Home-title">Edit Request Page</h2>
            <div class="divider"></div>

            <form class="create-form" id="editRequestForm">
                <div class="input-group">
                    <label class="price-label" style="text-align: left; display: block;">Item Type :</label>
                    <select class="select-field" id="itemType" required>
                        <option value="jewelry">Jewelry</option>
                        <option value="cash" selected>Cash</option>
                        <option value="electronics">High-value Electronics</option>
                    </select>
                </div>

                <div class="input-group">
                    <label class="price-label" style="text-align: left; display: block;">Item Value Range :</label>
                    <select class="select-field" id="itemValue" required onchange="checkInsuranceMessage()">
                        <option value="less5000">Less than 5,000 SAR</option>
                        <option value="5000-10000" selected>5,000 - 10,000 SAR</option>
                        <option value="more10000">More than 10,000 SAR</option>
                    </select>
                </div>

                <div class="input-group">
                    <label class="price-label" style="text-align: left; display: block;">Pickup Location :</label>
                    <input type="text" id="pickupLocation" class="input-field" value="Riyadh, Al Safa" required>
                </div>

                <div class="input-group">
                    <label class="price-label" style="text-align: left; display: block;">Dropoff Location :</label>
                    <input type="text" id="dropoffLocation" class="input-field" value="Riyadh, Al Narjis" required>
                </div>

                <div class="input-group">
                    <label class="price-label" style="text-align: left; display: block;">Security Code :</label>
                    <input type="password" id="securityCode" class="input-field" value="2233" maxlength="4" required>
                    <div class="security-note">4-digit code (shared with receiver)</div>
                </div>

                <div class="price-box">
                    <div class="price-label">Service price:</div>
                    <div class="price-amount" id="priceAmount">150 SAR</div>
                </div>

                <div class="price-box" id="insuranceBox" style="background-color: rgba(255, 255, 255, 0.15); display: none;">
                    <div class="price-label">Insurance coverage:</div>
                    <div class="price-amount">Up to 10,000 SAR</div>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="role-btn" onclick="window.location.href='RequestDetailsAfter.html'" style="background-color: white; color: #5f1428; flex: 1;">Save Changes</button>
                    <button type="button" class="role-btn" onclick="window.location.href='RequestDetailsAfter.html'" style="background-color: #fefefe; color: #5f1428; flex: 1;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
