<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thamean - Request Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="create-request-container">
        <a href="login.html" class="logout-link">
            <img src="images/logout.png" alt="Back" class="logout-icon" style="transform: rotate(180deg);">
        </a>

        <div class="container">
            <h2 class="Home-title">Request Details</h2>
            <div class="divider"></div>

            <div class="logo-container" style="margin-bottom: 20px;">
                <img src="images/money.png" alt="Order Icon" style="width: 200px; height: 200px;">
            </div>

            <div class="details-content">
                <div class="detail-item">
                    <span class="detail-label">Request ID :</span>
                    <span class="detail-value">5679</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Status :</span>
                    <span class="detail-value" id="statusText">Delivered</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Item Type :</span>
                    <span class="detail-value">Money</span>
                </div>
				<div class="detail-item">
                    <span class="detail-label">Item Value Range :</span>
                    <span class="detail-value" id="statusText">5000-10000</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Pickup Location :</span>
                    <span class="detail-value">Riyadh, Al Safa</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Drop-off Location :</span>
                    <span class="detail-value">Riyadh, Al Narjis</span>
                </div>
				<div class="detail-item">
                    <span class="detail-label">Service Price :</span>
                    <span class="detail-value">150 SAR</span>
                </div>
				<div class="detail-item">
                    <span class="detail-label">Insurance Coverage :</span>
                    <span class="detail-value">10000</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Security Code :</span>
                    <span class="detail-value">2233</span>
				</div>
				<div class="detail-item">
                    <span class="detail-label">Created At :</span>
                    <span class="detail-value">2026-2-19</span>
				</div>
            </div>

                <button type="submit" class="role-btn" onclick="window.location.href='rate_review.html'" style="background-color: white; color: #5f1428; flex: 1;">Rate & Review page</button>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
