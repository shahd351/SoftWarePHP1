<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thameen - Driver Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page">
    <div class="container">
        <div class="top-bar">
            <a href="login.html">
                <img src="images/logout.png" alt="Logout" style="width:40px; height:40px;">
            </a>
        </div>

        <div class="logo-container">
            <img src="images/thamen.bmp" alt="Thameen Logo" class="logo">
        </div>

        <h1 class="page-title">Driver Dashboard</h1>
        <div class="divider"></div>

        <div id="assignedRequest" class="review-box" style="text-align: left;">
            <div id="requestDetails">
                <p>Request ID: 1432</p>
                <p>Item Type: Jewelry</p>
                <p>Pickup: Riyadh, Al Rawabi</p>
                <p>Dropoff: Riyadh, Al Narjis</p>
                <p>Status: <span style="color: #ffcc00;">In Transit</span></p>
            </div>
            <button id="completeBtn" class="btn" onclick="completeDelivery()">Mark as Delivered</button>
        </div>
    </div>

    <script>
        function completeDelivery() {
            if (confirm("Mark this delivery as completed?")) {
                document.getElementById('requestDetails').innerHTML = `
                    <p>Request ID: 1432</p>
                    <p>Item Type: Jewelry</p>
                    <p>Pickup: Riyadh, Al Rawabi</p>
                    <p>Dropoff: Riyadh, Al Narjis</p>
                    <p>Status: <span style="color: #28a745;">Delivered ✓</span></p>
                `;
                document.getElementById('completeBtn').style.display = "none";
                alert("Delivery completed successfully.");
            }
        }
    </script>
</body>
</html>
