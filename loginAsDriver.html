<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thameen - Driver Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="images/thamen.bmp" alt="Thameen Logo" class="logoSmall">
        </div>
        
        <h2 class="login-title">Driver Login</h2>
        <p class="subtitle">Sign in to view your assigned deliveries.</p>
        
        <form class="login-form" id="driverLoginForm" action="driver_dashboard.html">
            <div class="input-group">
                <input type="text" id="driverFullName" placeholder="Full Name" class="input-field" required>
            </div>

            <div class="input-group">
                <input type="text" id="driverNationalId" placeholder="National ID" class="input-field" required>
            </div>
            
            <button type="submit" class="login-btn">Log in</button>
        </form>

    </div>

</body>
</html>
