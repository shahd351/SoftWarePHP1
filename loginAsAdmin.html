<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thamean - Admin Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="images/thamen.bmp" alt="Thamean Logo" class="logoSmall">
        </div>
        
        <h2 class="login-title">Login</h2>
        <p class="subtitle">Sign in to continue.</p>
        
        <form class="login-form" action="admin_dashboard.html">
            <div class="input-group">
                <input type="text" placeholder="username" class="input-field" required>
            </div>
            
            <div class="input-group">
                <input type="password" placeholder="Password" class="input-field" required>
            </div>
            
            <button type="submit" class="login-btn">Log in</button>
        </form>
    </div>
</body>
</html>
